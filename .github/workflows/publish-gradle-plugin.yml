name: Publish Gradle Plugin

on:
  # Run manually using the GitHub UI
  workflow_dispatch:

jobs:
  publish:
    name: Publish to Gradle Plugin Portal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      # Cache the Gradle home so Spotless' greclipse formatter (provisioned from
      # the flaky download.eclipse.org P2 site) is downloaded once and reused,
      # so a publish isn't blocked by a transient download.eclipse.org outage.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '26'
          cache: 'npm'

      - name: Install dependencies
        run: npm i

      - name: Build and publish plugin
        run: npx nx run gradle-plugin:publish-plugin
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
