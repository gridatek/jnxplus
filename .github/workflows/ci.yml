name: CI
on:
  workflow_dispatch:
  #  push:
  #    branches:
  #      - main
  #    paths-ignore:
  #      - '**.md'
  pull_request:
    branches:
      - main
    types: [assigned]
    paths-ignore:
      - '**.md'
jobs:
  Run_checks:
    strategy:
      matrix:
        os: [ubuntu-latest]
        node_version: ['26']
        java: ['17']
      fail-fast: true
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v5

      - name: Set up node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node_version }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      # Cache the Gradle home so Spotless' greclipse formatter (provisioned from
      # the flaky download.eclipse.org P2 site) is downloaded once and reused,
      # and cache the Maven local repo so generated Maven e2e workspaces don't
      # re-download every dependency (and are less exposed to transient outages).
      - name: Cache Gradle & Maven
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.m2/repository
          key: ${{ runner.os }}-build-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties', '**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Install dependencies
        run: npm i

      - name: Lint
        run: npm run nx run-many -- --target=lint

      - name: Unit tests
        run: npm run nx run-many -- --target=test

      - name: Build
        run: npm run nx run-many -- --target=build

      - name: E2E tests
        run: npm run nx run-many -- --target=e2e
        env:
          NX_VERBOSE_LOGGING: 'true'
          GITHUB_ACTIONS: 'true'
