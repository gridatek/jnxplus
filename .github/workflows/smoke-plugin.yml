name: Smoke plugin tests
on:
  workflow_dispatch:
    inputs:
      tag_option:
        type: choice
        description: tag option
        options:
          - latest
          - previous
          - next
          - 0.50.0
      nx_tag_option:
        type: choice
        description: nx tag option
        options:
          - latest
          - previous
          - next
          - 20.8.2
          - 19.8.14
          - 18.3.5
          - 17.0.6
          - 16.10.0
      t_option:
        type: choice
        description: t option
        options:
          - nx-gradle
          - nx-gradle micronaut smoke
          - nx-gradle default smoke
          - nx-gradle quarkus smoke
          - nx-gradle spring-boot smoke
          - nx-maven
          - nx-maven micronaut smoke
          - nx-maven micronaut bom smoke
          - nx-maven quarkus smoke
          - nx-maven spring-boot smoke
          - nx-maven spring-boot bom smoke
          - nx-maven default root as parent and aggregator smoke
      os:
        type: choice
        description: Os
        options:
          - ubuntu-latest
          - macos-latest
          - windows-latest

jobs:
  smoke-plugin:
    name: Running ${{ github.event.inputs.t_option }} smoke tests with nx ${{ github.event.inputs.nx_tag_option }} version and jnxplus ${{ github.event.inputs.tag_option }} version from ${{ github.head_ref || github.ref_name }} branch
    strategy:
      matrix:
        node_version: ['26']
        java: ['17']
      fail-fast: true
    runs-on: ${{ github.event.inputs.os }}
    env:
      NPM_TAG: ${{ github.event.inputs.tag_option }}
      NX_NPM_TAG: ${{ github.event.inputs.nx_tag_option }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Set up node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node_version }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      # Cache the Gradle home so Spotless' greclipse formatter (provisioned from
      # the flaky download.eclipse.org P2 site) is downloaded once and reused,
      # and cache the Maven local repo so generated Maven smoke workspaces don't
      # re-download every dependency (and are less exposed to transient outages).
      - name: Cache Gradle & Maven
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.m2/repository
          key: ${{ runner.os }}-build-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties', '**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Install dependencies
        run: npm i

      - name: smoke tests
        run: npm run nx smoke jnxplus-smoke -- --t="${{ github.event.inputs.t_option }}"
        env:
          NX_MAVEN_CLI_OPTS: '--no-transfer-progress -Dmaven.plugin.validation=VERBOSE'
